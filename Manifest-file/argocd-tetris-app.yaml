apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tetris-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/dragerzw/EKS-DevSecOps-GitOps-Pipeline--Tetris.git'
    targetRevision: main
    path: Manifest-file
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
